services:
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    image: auth-service:latest
    build: ./auth-service
    ports:
      - "5001:5001"
    env_file: ./auth-service/.env

  task-service:
    image: task-service:latest
    build: ./task-service
    ports:
      - "5002:5002"
    env_file: ./task-service/.env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - rabbitmq

  notification-service:
    image: notification-service:latest
    build: ./notification-service
    ports:
      - "5003:5003"
    env_file: ./notification-service/.env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - rabbitmq

  report-service:
    image: report-service:latest
    build: ./report-service
    ports:
      - "5004:5004"
    env_file: ./report-service/.env

  api-gateway:
    image: api-gateway:latest
    build: ./api-gateway
    ports:
      - "5000:5000"
    env_file: ./api-gateway/.env
    depends_on:
      - auth-service
      - task-service
      - notification-service
      - report-service

  client:
    image: client:latest
    build:
      context: ./client
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
