services:
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"
    env_file: ./auth-service/.env

  task-service:
    build: ./task-service
    ports:
      - "5002:5002"
    env_file: ./task-service/.env

  notification-service:
    build: ./notification-service
    ports:
      - "5003:5003"
    env_file: ./notification-service/.env

  report-service:
    build: ./report-service
    ports:
      - "5004:5004"
    env_file: ./report-service/.env

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    env_file: ./api-gateway/.env
    depends_on:
      - auth-service
      - task-service
      - notification-service
      - report-service
