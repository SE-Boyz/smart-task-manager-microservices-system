name: CI - Pull Request

on:
  pull_request:
    branches:
      - main
      - staging
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, notification-service, report-service, task-service]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}
      - name: Build check
        run: npm run build || true # Add build script if needed
        working-directory: ${{ matrix.service }}
      - name: Run tests
        run: npm test || true
        working-directory: ${{ matrix.service }}

  docker-build-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, notification-service, report-service, task-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build .
        working-directory: ${{ matrix.service }}
