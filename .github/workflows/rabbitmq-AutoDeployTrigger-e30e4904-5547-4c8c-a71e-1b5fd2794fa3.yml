name: Trigger auto deployment for rabbitmq

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ config/azure-cicd ]
    paths:
    - '**'
    - '.github/workflows/rabbitmq-AutoDeployTrigger-e30e4904-5547-4c8c-a71e-1b5fd2794fa3.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RABBITMQ_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RABBITMQ_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RABBITMQ_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrsmarttaskmanagersea.azurecr.io
          registryUsername: ${{ secrets.RABBITMQ_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RABBITMQ_REGISTRY_PASSWORD }}
          containerAppName: rabbitmq
          resourceGroup: rg-smart-task-manager-sea
          imageToBuild: acrsmarttaskmanagersea.azurecr.io/rabbitmq:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


