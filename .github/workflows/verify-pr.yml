name: CI Quality Checks

on:
  push:
    branches: [ "config/azure-cicd" ]
  pull_request:
    branches: [ "config/azure-cicd" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, task-service, notification-service, report-service, audit-service, api-gateway, client]
    
    defaults:
      run:
        working-directory: ./${{ matrix.service }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Root Tools
      run: npm install
      working-directory: .

    - name: Install & Verify Service
      run: |
        npm install
        npm run lint -- --ext .ts,.tsx,.js,.jsx . || true
        npm test
