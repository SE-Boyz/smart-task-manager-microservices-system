name: Deploy Microservices to AWS ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, task-service, notification-service, report-service]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1 # NOTE: Change this if your ECR is in a different region

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        SERVICE_NAME: ${{ matrix.service }}
        IMAGE_TAG: latest
      run: |
        cd $SERVICE_NAME
        docker build -t $ECR_REGISTRY/$SERVICE_NAME:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$SERVICE_NAME:$IMAGE_TAG
