name: Azure Continuous Deployment (Self-Hosted)

on:
  push:
    branches: [ "config/azure-cicd" ]

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: self-hosted
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build & Push Microservices
      run: |
        $ACR = "acrsmarttaskmanagersea"
        $services = @("auth-service", "task-service", "notification-service", "report-service", "audit-service", "api-gateway")
        foreach ($s in $services) {
          Write-Host "🏗️ Building $s..." -ForegroundColor Cyan
          docker build -t "$ACR.azurecr.io/$s:latest" ./$s
          docker push "$ACR.azurecr.io/$s:latest"
        }

    - name: Build & Push Frontend (Client)
      run: |
        $ACR = "acrsmarttaskmanagersea"
        $RG = "rg-smart-task-manager-sea"
        $GATEWAY_URL = (& az containerapp show --name api-gateway --resource-group $RG --query "properties.configuration.ingress.fqdn" -o tsv)
        Write-Host "🌐 Building Client with Gateway: $GATEWAY_URL" -ForegroundColor Cyan
        docker build --build-arg VITE_API_BASE_URL=https://$GATEWAY_URL -t "$ACR.azurecr.io/client:latest" ./client
        docker push "$ACR.azurecr.io/client:latest"

    - name: Update Azure Container Apps
      run: |
        $RG = "rg-smart-task-manager-sea"
        $services = @("auth-service", "task-service", "notification-service", "report-service", "audit-service", "api-gateway", "client")
        foreach ($s in $services) {
          Write-Host "🚀 Updating $s in Azure..." -ForegroundColor Green
          az containerapp update --name $s --resource-group $RG --image "acrsmarttaskmanagersea.azurecr.io/$s:latest"
        }
